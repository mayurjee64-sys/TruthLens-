<!DOCTYPE html>
<html>
<head>
<title>TruthLens</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0d2045;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:500px;
text-align:center;
}

.logo{
font-size:40px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#9bb7ff;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:20px;
background:white;
color:black;
padding:15px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">TruthLens</div>

<div class="subtitle">
See the truth behind every claim
</div>

<input id="claim" placeholder="Paste a claim or news headline">

<button onclick="checkTruth()">Check Truth</button>

<div id="result" class="result"></div>

</div>

<script>

function checkTruth(){

let claim=document.getElementById("claim").value
let result=document.getElementById("result")

result.style.display="block"

if(claim==""){
result.innerHTML="Please enter a claim"
return
}

result.innerHTML="Analyzing claim..."

setTimeout(function(){
result.innerHTML="Demo result: AI verification will appear here."
},1500)

}

</script>

</body>
</html>
